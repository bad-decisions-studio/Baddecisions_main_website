  <!-- ─── NEWSLETTER ───────────────────────────────────────── -->
  <section class="newsletter surface-premium">
    <div class="nl-atmosphere" aria-hidden="true">
      <div class="nl-glow"></div>
    </div>
    <div class="container">
      <div class="nl-shell reveal">
        <div class="nl-copy">
          <div class="nl-eyebrow">
            <span class="nl-eyebrow-line"></span>
            <span class="nl-eyebrow-text">The Newsletter</span>
          </div>
          <h2 class="nl-heading">
            Get our best work in your <em>inbox.</em>
          </h2>
          <p class="nl-body">
            Tech updates, what we&rsquo;re building, and our latest content and products sent directly to you.
          </p>
        </div>
        <form class="nl-form" novalidate>
          <!-- Honeypot — hidden from real users, filled by bots -->
          <input type="text" name="company_url" tabindex="-1" autocomplete="off" aria-hidden="true" class="nl-honeypot">

	          <div class="nl-fields">
	            <label class="nl-field">
	              <input type="text" name="name" placeholder="First name" autocomplete="given-name" aria-label="Name" minlength="2" required>
	            </label>
	            <label class="nl-field">
	              <input type="email" name="email" placeholder="john@gmail.com" autocomplete="email" aria-label="Email" required>
	            </label>
	          </div>
          <button type="submit" class="nl-submit">
            <span class="nl-submit-text">Subscribe</span>
            <span class="nl-submit-arrow" aria-hidden="true">&rarr;</span>
          </button>
          <div class="nl-success" role="status" aria-live="polite" hidden>
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="2 7 6 11 12 3"/></svg>
            <span>You're on the list. Check your inbox.</span>
          </div>
          <div class="nl-error" role="alert" aria-live="polite" hidden>
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="7" cy="7" r="5.5"/><line x1="7" y1="4.5" x2="7" y2="7.5"/><circle cx="7" cy="9.5" r="0.5" fill="currentColor"/></svg>
            <span class="nl-error-text">Something went wrong. Please try again.</span>
          </div>
        </form>
      </div>
    </div>
  </section>

  <script>
  (function() {
    /* ── Klaviyo config ──────────────────────────────────
       These are PUBLIC client-side identifiers, not secrets.
       See https://developers.klaviyo.com/en/reference/create_client_subscription
       Bump the API revision when upgrading. */
    var KLAVIYO_PUBLIC_KEY = 'Tir9Yi';
    var KLAVIYO_LIST_ID = 'UWvYjQ';
    var KLAVIYO_API_REVISION = '2024-02-15';
    var SUBMIT_COOLDOWN_MS = 5000;

    /* Per-form state so multiple newsletter forms on the same page
       (e.g. homepage + footer) each have their own cooldown. */
    var lastSubmitTime = new WeakMap();

    function isValidEmail(value) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value);
    }

    function detectSource() {
      var path = (window.location.pathname || '/').toLowerCase();
      if (path === '/' || path === '') return 'BD Studio Homepage';
      if (path.indexOf('/podcast') === 0) return 'BD Studio Podcast';
      if (path.indexOf('/learn') === 0) return 'BD Studio Learn';
      if (path.indexOf('/work-with-us/services') === 0) return 'BD Studio Services';
      if (path.indexOf('/work-with-us/media-partnerships') === 0) return 'BD Studio Media Partnerships';
      if (path.indexOf('/work-with-us/open-roles') === 0) return 'BD Studio Open Roles';
      if (path.indexOf('/work-with-us') === 0) return 'BD Studio Work With Us';
      return 'BD Studio' + path;
    }

    function showError(form, message) {
      var errBox = form.querySelector('.nl-error');
      var errText = form.querySelector('.nl-error-text');
      var success = form.querySelector('.nl-success');
      if (success) success.hidden = true;
      if (errText && message) errText.textContent = message;
      if (errBox) errBox.hidden = false;
    }

    function showSuccess(form) {
      var success = form.querySelector('.nl-success');
      var errBox = form.querySelector('.nl-error');
      var fineprint = form.querySelector('.nl-fineprint');
      if (errBox) errBox.hidden = true;
      if (fineprint) fineprint.hidden = true;
      if (success) success.hidden = false;
    }

    function setSubmitting(btn, state) {
      if (!btn) return;
      btn.disabled = state;
      var text = btn.querySelector('.nl-submit-text');
      if (text) text.textContent = state ? 'Subscribing...' : 'Subscribe';
    }

    function handleSubmit(e) {
      e.preventDefault();
      var form = e.currentTarget;

      /* Honeypot: if a bot filled the hidden field, silently succeed */
      var honeypot = form.querySelector('.nl-honeypot');
      if (honeypot && honeypot.value) return;

      /* Debounce rapid submissions */
      var now = Date.now();
      var last = lastSubmitTime.get(form) || 0;
      if (now - last < SUBMIT_COOLDOWN_MS) {
        showError(form, 'Please wait a few seconds before trying again.');
        return;
      }

      var nameInput = form.querySelector('input[name="name"]');
      var emailInput = form.querySelector('input[name="email"]');
      var name = nameInput ? nameInput.value.trim() : '';
      var email = emailInput ? emailInput.value.trim() : '';

      if (name.length < 2) { showError(form, 'Please enter your name.'); return; }
      if (!isValidEmail(email)) { showError(form, 'Please enter a valid email.'); return; }

      lastSubmitTime.set(form, now);
      var submitBtn = form.querySelector('.nl-submit');
      setSubmitting(submitBtn, true);

      var source = form.getAttribute('data-source') || detectSource();
      var payload = {
        data: {
          type: 'subscription',
          attributes: {
            profile: {
              data: {
                type: 'profile',
                attributes: { email: email, first_name: name }
              }
            },
            custom_source: source
          },
          relationships: {
            list: {
              data: { type: 'list', id: KLAVIYO_LIST_ID }
            }
          }
        }
      };

      fetch('https://a.klaviyo.com/client/subscriptions/?company_id=' + KLAVIYO_PUBLIC_KEY, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'revision': KLAVIYO_API_REVISION
        },
        body: JSON.stringify(payload)
      }).then(function(res) {
        if (!res.ok) throw new Error('status_' + res.status);
        form.reset();
        showSuccess(form);
      }).catch(function(err) {
        var isNetwork = err && err.message === 'Failed to fetch';
        showError(form, isNetwork
          ? 'Network error — check your connection and try again.'
          : 'Something went wrong. Please try again.');
      }).then(function() {
        setSubmitting(submitBtn, false);
      });
    }

    var forms = document.querySelectorAll('.nl-form');
    forms.forEach(function(form) {
      form.addEventListener('submit', handleSubmit);
    });
  })();
  </script>
